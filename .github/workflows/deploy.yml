name: Fetch Data & Deploy Dashboard

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 22 * * 5"     # Fridays at 10 PM UTC (weekly, after US market close)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      # ── Cache historical market data ────────────────────────────────────────
      # Key rotates monthly so a full re-fetch happens automatically once/month.
      # On cache hit the fetch scripts only pull the last ~7 days incrementally.
      - name: Get current month (cache key)
        id: month
        run: echo "val=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Restore market data cache
        id: cache
        uses: actions/cache@v4
        with:
          path: data/
          key: market-data-v2-${{ steps.month.outputs.val }}
          restore-keys: |
            market-data-v2-

      - name: Set end_date to today in config.toml
        run: |
          TODAY=$(date +'%Y-%m-%d')
          sed -i "s/^end_date.*=.*/end_date      = \"$TODAY\"/" config.toml
          sed -i "s/^end_date   =.*/end_date   = \"$TODAY\"/" config.toml
          grep end_date config.toml

      # ── Phase 1: Fetch data in parallel ────────────────────────────────────
      # fetch.py and fetch_intraday.py have no shared inputs — run together.
      - name: "Phase 1 · Fetch SPX/VIX + intraday data (parallel)"
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: |
          PYTHONPATH=. uv run python scripts/fetch.py &
          pid_fetch=$!
          PYTHONPATH=. uv run python scripts/fetch_intraday.py &
          pid_intra=$!
          wait $pid_fetch  || exit 1
          wait $pid_intra  || exit 1

      # ── Phase 2: VIX1D + analysis in parallel ──────────────────────────────
      # All three read from fetch.py outputs (spx_1min.csv, vix_daily.csv).
      # reversal_analysis.json is needed by the models in phase 3.
      - name: "Phase 2 · VIX1D + analyze + reversal (parallel)"
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: |
          PYTHONPATH=. uv run python scripts/fetch_vix1d.py &
          pid_vix1d=$!
          PYTHONPATH=. uv run python scripts/analyze.py &
          pid_ana=$!
          PYTHONPATH=. uv run python scripts/reversal_analysis.py &
          pid_rev=$!
          wait $pid_vix1d  || exit 1
          wait $pid_ana    || exit 1
          wait $pid_rev    || exit 1

      # ── Phase 3: Build all models in parallel ──────────────────────────────
      # All models read reversal_analysis.json + CSV data from phases 1-2.
      - name: "Phase 3 · Build all models (parallel)"
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: |
          PYTHONPATH=. uv run python scripts/build_model.py &
          pid_m1=$!
          PYTHONPATH=. uv run python scripts/build_model2.py &
          pid_m2=$!
          PYTHONPATH=. uv run python scripts/build_model3.py &
          pid_m3=$!
          PYTHONPATH=. uv run python scripts/build_warlord.py &
          pid_w=$!
          wait $pid_m1 || exit 1
          wait $pid_m2 || exit 1
          wait $pid_m3 || exit 1
          wait $pid_w  || exit 1

      # ── Save updated data back to cache ─────────────────────────────────────
      # actions/cache saves automatically at job end when key matches or is new.
      # No explicit save step needed — the cache action handles it.

      # ── Deploy ───────────────────────────────────────────────────────────────
      - name: Copy data into dashboard
        run: |
          cp data/spx_1min.csv            dashboard/
          cp data/spx_options_snapshot.csv dashboard/
          cp data/patches_analysis.json   dashboard/
          cp data/reversal_analysis.json  dashboard/
          cp data/model_results.json      dashboard/
          cp data/model2_results.json     dashboard/
          cp data/model3_results.json     dashboard/
          cp data/warlord_results.json   dashboard/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - uses: actions/deploy-pages@v4
        id: deployment
