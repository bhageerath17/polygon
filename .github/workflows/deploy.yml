name: Fetch Data & Deploy Dashboard

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 22 * * 1-5"   # weekdays at 10 PM UTC (after US market close)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Fetch SPX + VIX data
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: PYTHONPATH=. uv run python scripts/fetch.py

      - name: Run patches analysis
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: PYTHONPATH=. uv run python scripts/analyze.py

      - name: Run reversal analysis
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: PYTHONPATH=. uv run python scripts/reversal_analysis.py

      - name: Build prediction model
        run: PYTHONPATH=. uv run python scripts/build_model.py

      - name: Copy data into dashboard
        run: |
          cp data/spx_1min.csv dashboard/
          cp data/spx_options_snapshot.csv dashboard/
          cp data/patches_analysis.json dashboard/
          cp data/reversal_analysis.json dashboard/
          cp data/model_results.json dashboard/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - uses: actions/deploy-pages@v4
        id: deployment
